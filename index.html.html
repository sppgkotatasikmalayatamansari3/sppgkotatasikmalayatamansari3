<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SPPG Kota Tasikmalaya Tamansari 3</title>

<style>

body{
font-family: Arial, sans-serif;
background:#eef2f6;
margin:0;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
width:380px;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:5px;
}

.subtitle{
text-align:center;
font-size:13px;
color:#666;
margin-bottom:20px;
}

label{
font-size:14px;
font-weight:bold;
}

input{
width:100%;
padding:10px;
margin-top:5px;
margin-bottom:12px;
border-radius:5px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#2b7cff;
color:white;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#1f5fd1;
}

.lokasi{
background:#f4f6f8;
padding:10px;
border-radius:6px;
font-size:13px;
margin-bottom:15px;
}

iframe{
width:100%;
height:200px;
border:none;
border-radius:8px;
margin-bottom:15px;
}

</style>
</head>

<body>

<div class="container">

<h2>SPPG Kota Tasikmalaya Tamansari 3</h2>
<div class="subtitle">Verifikasi Titik Koordinat Lokasi</div>

<label>Nama</label>
<input type="text" id="nama">

<label>NIK</label>
<input type="text" id="nik">

<div class="lokasi" id="lokasi">
Mengambil lokasi...
</div>

<iframe id="map"></iframe>

<button onclick="kirim()">Kirim Data</button>

</div>

<script>

let latitude="";
let longitude="";

function getLocation(){

if(navigator.geolocation){

navigator.geolocation.getCurrentPosition(function(position){

latitude = position.coords.latitude;
longitude = position.coords.longitude;

document.getElementById("lokasi").innerHTML =
"Latitude: "+latitude+"<br>Longitude: "+longitude;

document.getElementById("map").src =
"https://maps.google.com/maps?q="+latitude+","+longitude+"&z=15&output=embed";

});

}else{

document.getElementById("lokasi").innerHTML="GPS tidak didukung";

}

}

getLocation();

function kirim(){

let nama=document.getElementById("nama").value;
let nik=document.getElementById("nik").value;

alert(
"Data berhasil dikirim\n\n"+
"Nama: "+nama+
"\nNIK: "+nik+
"\nLatitude: "+latitude+
"\nLongitude: "+longitude
);

}

</script>

</body>
</html>
